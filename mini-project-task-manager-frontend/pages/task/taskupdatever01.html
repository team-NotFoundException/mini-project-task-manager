<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>공지 디테일</title>
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/notification.css" />
    <link rel="stylesheet" href="/css/taskstyle.css" />
  </head>
  <body>
    <div class="container">
      <!-- 사이드바 -->
      <aside class="sidebar">
        <div class="logo">
          <img src="../../logo.png" alt="사이트 로고" />
          <div class="title">
            <img src="../../logo.png" alt="dlalwl" />
            <h4>ABC (ADMIN)</h4>
          </div>
        </div>

        <nav class="menu">
          <div class="project">
            <a href="#" class="btn">🖥️ 프로젝트</a>
            <a href="#" class="btn">🛎️ 테스크</a>
            <a href="#" class="btn">👤 마이페이지</a>
            <a href="#" class="btn">🛎️ 공지</a>
          </div>
        </nav>
        <div class="etc">
          <button class="btn" id="settings">🚪 Settings</button>
          <a href="#" class="btn logout-btn">🚪 로그아웃</a>
        </div>
      </aside>

      <!-- 메인 영역 -->
      <div class="main-area">
        <header>
          <h1>Task</h1>
        </header>

        <main class="content">
          <!-- 해당 란에 본인 도메인 제작하시면 됩니다 -->

          <!-- 아래부터는 card 컨테이너입니다 필요하신 분들 쓰시구요 -->

          <div class="task-title-card">
            <div class="task-header">
              <span>제목 작성</span>
            </div>
            <p class="title" id="create">
              <input
                name="content"
                id="create"
                placeholder="해당 Task의 제목"
              />
            </p>

            <div class="task-body"></div>
          </div>

          <div class="task-content-card">
            <div class="task-header">
              <span>본문 내용 작성</span>
            </div>
            <p class="task-content" id="create">
              <textarea
                name="content"
                id="create"
                placeholder="해당 Task의 본문"
              ></textarea>
            </p>

            <div class="task-body"></div>
          </div>

          <div class="task-select-card">
            <div class="task-header">
              <span>태그 설정(Priority) / (Status)</span>
            </div>
            <div class="settag">
              <div class="priority-group">
                <input type="radio" id="low" name="level" value="LOW" />
                <label for="low">LOW</label>

                <input type="radio" id="medium" name="level" value="MEDIUM" />
                <label for="medium">MEDIUM</label>

                <input type="radio" id="high" name="level" value="HIGH" />
                <label for="high">HIGH</label>
              </div>

              <div class="todo-group">
                <input type="radio" id="todo" name="status" value="todo" />
                <label for="todo" class="status-todo">TODO</label>

                <input
                  type="radio"
                  id="inprogress"
                  name="status"
                  value="inprogress"
                />
                <label for="inprogress" class="status-inprogress"
                  >IN PROGRESS</label
                >

                <input type="radio" id="done" name="status" value="done" />
                <label for="done" class="status-done">DONE</label>
              </div>

              <div class="task-body"></div>
            </div>
          </div>
          <!-- 마감 기한 설정 -->
          <div class="task-title-card">
            <div class="task-header">
              <span>마감 기한</span>
            </div>
            <input
              type="date"
              placeholder="마감 기한을 설정해주세요"
              required
            />
          </div>

          <div class="task-title-card">
            <div class="task-header">
              <span>태그 설정</span>
            </div>
            <input
              type="text"
              name="creattag"
              placeholder="태그명을 입력해주세요"
            />
          </div>
        </main>

        <footer>
          <button class="save" type="submit">수정</button>
          <button type="submit">삭제</button>
        </footer>
      </div>
    </div>

    <script src="/js/notification.js"></script>
  </body>
</html>
