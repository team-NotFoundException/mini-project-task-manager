<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>기본</title>
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/task-list.css" />
</head>

<body>
  <div class="container">
    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="logo">
        <img src="../../logo.png" alt="사이트 로고" />
        <div class="title">
          <img src="../../logo.png" alt="dlalwl">
          <h4>ABC (ADMIN) </h4>
        </div>
      </div>

      <nav class="menu">
        <div class="project">
          <a href="#" class="btn">🖥️ 프로젝트</a>
          <a href="#" class="btn">🛎️ 테스크</a>
          <a href="#" class="btn">👤 마이페이지</a>
          <a href="#" class="btn">🛎️ 공지</a>
        </div>
      </nav>
      <div class="etc">
        <button class="btn" id="settings">🚪 Settings</button>
        <a href="#" class="btn logout-btn">🚪 로그아웃</a>
      </div>
    </aside>

    <!-- 메인 영역 -->
    <div class="main-area">
      <header>
        <h1>Project#1 운동</h1>
      </header>

      <main class="content">
        <!-- 해당 란에 본인 도메인 제작하시면 됩니다 -->
        <button class="empty">+ Add Task</button>


        <footer><!-- 필요 시 추가 --></footer>
    </div>
  </div>

  <script>
    // 헤더 스크롤 감지해서 블러 처리
    const mainArea = document.querySelector(".main-area");
    const header = document.querySelector("header");

    mainArea.addEventListener("scroll", () => {
      if (mainArea.scrollTop > 0) {
        header.classList.add("blurred");
      } else {
        header.classList.remove("blurred");
      }
    });
  </script>
</body>

</html>
