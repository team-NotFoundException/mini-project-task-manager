<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이디 찾기</title>
  <link rel="stylesheet" href="/css/find-id.css">
</head>
<body class="login-page">
  <div class="login-container">
    <h2>아이디 찾기</h2>
    <form action="id_find_process.html" method="POST">

      <!-- 이름 -->
      <input type="text" name="name" placeholder="이름" required>

      <!-- 이메일 + 인증번호 -->
      <div class="input-group">
        <input type="email" name="email" placeholder="가입한 이메일" required>
        <button type="button" class="check-button">인증번호 발송</button>
      </div>
      <div class="input-group">
        <input type="text" name="email_code" placeholder="인증번호 입력" required>
        <button type="button" class="check-button">인증번호 확인</button>
      </div>

      <!-- 아이디 찾기 버튼 -->
      <button type="submit" class="main-button">아이디 찾기</button>
    </form>

    <!-- 로그인 이동 링크 -->
    <div class="link">
      <a href="/pages/sing-in/sing-in.html" class="link-button">로그인으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
