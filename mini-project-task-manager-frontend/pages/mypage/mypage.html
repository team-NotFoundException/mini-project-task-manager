<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지</title>
  <link rel="stylesheet" href="/css/mypage.css">
</head>
<body>
  <div class="layout">
    
    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="logo">
        <img src="image.png" alt="사이트 로고">
      </div>
      <nav class="menu">
        <a href="#" class="active">🏠 홈</a>
        <a href="#">🖥️ 프로젝트</a>
        <a href="#">🛎️ 테스크</a>
        <a href="#">👤 마이페이지</a>
      </nav>
      <div class="logout">
        <a href="#">🚪 로그아웃</a>
      </div>
    </aside>

    <!-- 메인 컨텐츠 -->
    <main class="content">
      <h2>My Page</h2>
      <div class="comment-card">
        <div class="comment-header">
          <span>2025-10-01</span>
          <span class="status">댓글</span>
        </div>
        <br />
        <p class="title">안녕하세요</p>
        <div class="comment-body">
          <span class="tag">#반갑습니다</span>
          <span class="tag">#안녕하세요</span>
        </div>
      </div>

      <div class="comment-card">
        <div class="comment-header">
          <span>2025-10-02</span>
          <span class="status">댓글</span>
        </div>
        <br />
        <p class="title">안녕하세요</p>
        <div class="comment-body">
          <span class="tag">#반갑습니다</span>
          <span class="tag">#안녕하세요</span>
        </div>
      </div>

      <div class="comment-card">
        <div class="comment-header">
          <span>2025-10-03</span>
          <span class="status">댓글</span>
        </div>
        <br />
        <p class="title">안녕하세요</p>
        <div class="comment-body">
          <span class="tag">#반갑습니다</span>
          <span class="tag">#안녕하세요</span>
        </div>
      </div>
    </main>
    <!-- 프로필 패널 -->
    <aside class="profile">
      <div class="avatar"></div>
      <p class="username">UserName</p>
      <p class="verify">로그인 됨</p>

      <div class="section">
        <h4>계정</h4>
        <a href="#">내 정보 관리</a>
        <a href="#">프로필 맞춤설정</a>
      </div>

      <div class="section">
        <h4>프로젝트 관리</h4>
        <a href="#">내가 만든 프로젝트</a>
        <a href="#">프로젝트 카테고리</a>
        <a href="#">프로젝트 변경</a>
      </div>
    </aside>
  </div>
</body>
</html>
