<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Page</title>
    <link rel="stylesheet" href="/css/mypage.css" />
  </head>
  <body>
    <div class="container">
      <!-- 사이드바 토글용 체크박스 -->
      <input type="checkbox" id="menu-toggle" />

      <!-- 사이드바 -->
      <aside class="sidebar">
        <div class="hbg">
          <!-- 햄버거 버튼 -->
          <label for="menu-toggle" class="menu-btn">☰</label>
        </div>

        <div class="logo">
          <img src="/logo.png" alt="사이트 로고" />
          <div class="title">
            <h4>ABC (ADMIN)</h4>
          </div>
        </div>

        <nav class="menu">
          <a href="#">🏠 홈</a>
          <a href="#">🖥️ 프로젝트</a>
          <a href="#">🛎️ 테스크</a>
          <a href="#">👤 마이페이지</a>
          <a href="#">📦 대충무언가</a>
        </nav>

        <div class="etc">
          <button id="settings">⚙️ Settings</button>
          <a href="#" class="logout-btn">🚪 로그아웃</a>
        </div>
      </aside>

      <!-- 메인 영역 -->
      <div class="main-area">
        <header>
          <h1>My Page</h1>
          <input
            type="text"
            id="search"
            name="search"
            placeholder="검색어를 입력하세요"
          />
        </header>

        <main class="content">
          <div class="comment-card">
            <div class="comment-header">
              <span>2025-10-01</span>
              <span class="status">댓글</span>
            </div>
            <p class="title">안녕하세요</p>
            <div class="comment-body">
              <span class="tag">#반갑습니다</span>
              <span class="tag">#안녕하세요</span>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
