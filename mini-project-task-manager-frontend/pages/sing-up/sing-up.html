<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="sing-up.css">
</head>
<body class="login-page">
  <div class="login-container">
    <h2>회원가입</h2>
    <form action="signup_process.html" method="POST">

      <!-- 아이디 + 중복확인 -->
      <div class="input-group">
        <input type="text" name="username" placeholder="아이디" required>
        <button type="button" class="check-button">중복확인</button>
      </div>

      <!-- 비밀번호 + 확인 -->
      <input type="password" name="password" placeholder="비밀번호" required>
      <input type="password" name="password_confirm" placeholder="비밀번호 확인" required>
      

      <!-- 이메일 + 중복확인 + 인증번호 -->
      <div class="input-group">
        <input type="email" name="email" placeholder="이메일" required>
        <button type="button" class="check-button">중복확인</button>
      </div>
      <div class="input-group">
        <input type="text" name="email_code" placeholder="인증번호 입력" required>
        <button type="button" class="check-button">인증확인</button>
      </div>

      <!-- 성별 -->
      <div class="gender">
        <select name="gender" required>
          <option value="" disabled selected>성별선택</option>
          <option value="male">남</option>
          <option value="female">여</option>
        </select>
      </div>

      <!-- 회원가입 버튼 -->
      <button type="submit" class="main-button">회원가입</button>
    </form>

    <!-- 로그인 이동 링크 -->
    <div class="link">
      <a href="login.html" class="link-button">로그인으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
