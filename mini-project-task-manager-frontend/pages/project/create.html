<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기본</title>
    <link rel="stylesheet" href="../../css/layout.css" >
    <link rel="stylesheet" href="../../css/project.css">
  </head>
  <body>
    <div class="container">
      <!-- 사이드바 -->
      <aside class="sidebar">
        <div class="logo">
          <div class="title">
            <img src="../../assets/img_source/프로필.png" alt="이미지" id="profile">
            <h4>닉네임</h4>
          </div>
          <img src="../../image.png" alt="사이트 로고" id="logo">
        </div>

        
        <nav class="menu">
          

          <div class="project">
            <a href="#">🏠 홈</a>
            <a href="#" class="btn">🖥️ 프로젝트</a>
            <a href="#" class="btn">👤 마이페이지</a>
            <a href="#" class="btn">🛎️ 공지</a>
          </div>
        </nav>
        <div class="etc">
          <button class="btn" id="settings">🚪 환경설정</button>
          <a href="#" class="btn logout-btn">🚪 로그아웃</a>
        </div>
      </aside>

      <!-- 메인 영역 -->
      <div class="main-area">
        <header>
          <h1>Project</h1>
          <input
            type="text"
            id="search"
            name="search"
            placeholder="검색어를 입력하세요"
          />
        </header>

        <main class="content">
          <!-- 해당 란에 본인 도메인 제작하시면 됩니다 -->

          <div class="create">
            <div class="title">
              <input
                type="text"
                id="title-c"
                name="title-c"
                placeholder="제목을 입력하세요"
                >
            </div>
            <div class="content">
              <input
                type="text"
                id="content-c"
                name="content-c"
                placeholder="내용을 입력하세요"
                >
            </div>
          </div>
          
        </main>

        <footer><!-- 필요 시 추가 --></footer>
      </div>
    </div>

    <script>
      // 헤더 스크롤 감지해서 블러 처리
      const mainArea = document.querySelector(".main-area");
      const header = document.querySelector("header");

      mainArea.addEventListener("scroll", () => {
        if (mainArea.scrollTop > 0) {
          header.classList.add("blurred");
        } else {
          header.classList.remove("blurred");
        }
      });
    </script>
  </body>
</html>
