<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기본</title>
    <link rel="stylesheet" href="../../css/layout.css" >
    <link rel="stylesheet" href="../../css/project.css">
  </head>
  <body>
    <div class="container">
      <!-- 사이드바 -->
      <aside class="sidebar">
        <div class="logo">
          <img src="../../logo.png" alt="사이트 로고" id="logo">
          <div class="title">
            <img src="../../assets/img_source/프로필.png" alt="dlalwl" id="profile">
          </div>
          <h4 class="nickname">ABC (ADMIN) </h4>
        </div>
        <nav class="menu">
          <div class="project">
            <a href="#" class="btn">🖥️ 프로젝트</a>
            <a href="#" class="btn">👤 마이페이지</a>
            <a href="#" class="btn">🛎️ 공지</a>
          </div>
        </nav>
        <div class="etc">
          <button class="btn" id="settings">🚪 환경설정</button>
          <a href="#" class="btn logout-btn">🚪 로그아웃</a>
        </div>
      </aside>

      <!-- 메인 영역 -->
      <div class="main-area">
        <header>
          <h1>Project</h1>
          <input
            type="text"
            id="search"
            name="search"
            placeholder="검색어를 입력하세요"
          />
          <button>검색</button>
        </header>

        <main class="content">
          <!-- 해당 란에 본인 도메인 제작하시면 됩니다 -->
          <div class="big-title">
            <h1>프로젝트 생성</h1>
          </div>
          <div class="create-title">
              <span>제목</span>
            <p class="" id="fix">
              <textarea name="title" id="text" placeholder="제목을 입력해주세요."></textarea>
            </p>
          </div>

          <div class="create-content">
            <span>개요</span>
            <p class="notification-content" id="fix">
              <textarea name="content" id="text" placeholder="개요를 입력해주세요."></textarea>
            </p>
          </div>

          <div class="create-button">
            <button>취소</button>
            <button>생성</button>
          </div>
        </main>

        <footer><!-- 필요 시 추가 --></footer>
      </div>
    </div>

    <script>
      // 헤더 스크롤 감지해서 블러 처리
      const mainArea = document.querySelector(".main-area");
      const header = document.querySelector("header");

      mainArea.addEventListener("scroll", () => {
        if (mainArea.scrollTop > 0) {
          header.classList.add("blurred");
        } else {
          header.classList.remove("blurred");
        }
      });
    </script>
  </body>
</html>
